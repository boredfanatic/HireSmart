<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Applications — HireSmart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <a href="index.html" class="sidebar-brand-text text-decoration-none">Hire<span>Smart</span></a>
    </div>
    <div class="sidebar-section-label">Main</div>
    <nav class="sidebar-nav">
      <a href="dashboard_candidate.html" class="sidebar-link"><i class="bi bi-grid-1x2"></i> Dashboard</a>
      <a href="jobs.html" class="sidebar-link"><i class="bi bi-briefcase"></i> Browse Jobs</a>
      <a href="applications.html" class="sidebar-link active"><i class="bi bi-send"></i> My Applications</a>
      <a href="parse_cv.html" class="sidebar-link"><i class="bi bi-file-earmark-person"></i> Parse CV</a>
    </nav>
    <div class="sidebar-section-label">Account</div>
    <nav class="sidebar-nav">
      <a href="profile.html" class="sidebar-link"><i class="bi bi-person-circle"></i> My Profile</a>
      <a href="login.html" class="sidebar-link" style="color:rgba(239,68,68,.7);"><i class="bi bi-box-arrow-left"></i> Log Out</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar">JS</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name">Jane Smith</div>
          <div class="sidebar-user-role">Candidate</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <header class="main-header">
      <div class="d-flex align-items-center gap-3">
        <button class="sidebar-toggle" onclick="openSidebar()"><i class="bi bi-list"></i></button>
        <h1 class="main-header-title">My Applications</h1>
      </div>
      <div class="d-flex align-items-center gap-2">
        <button class="btn-icon" type="button" title="Notifications"><i class="bi bi-bell"></i></button>
        <div class="sidebar-avatar" style="width:36px;height:36px;font-size:.78rem;">JS</div>
      </div>
    </header>

    <div class="main-body">

      <!-- Summary cards -->
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-3 animate-fade-up">
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;text-align:center;cursor:pointer;transition:all .2s;" onclick="filterByStatus('all')" id="tab-all">
            <div style="font-size:1.75rem;font-weight:800;color:var(--text);">7</div>
            <div style="font-size:.75rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;">Total</div>
          </div>
        </div>
        <div class="col-6 col-md-3 animate-fade-up delay-1">
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;text-align:center;cursor:pointer;transition:all .2s;" onclick="filterByStatus('pending')" id="tab-pending">
            <div style="font-size:1.75rem;font-weight:800;color:var(--warning);">3</div>
            <div style="font-size:.75rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;">Pending</div>
          </div>
        </div>
        <div class="col-6 col-md-3 animate-fade-up delay-2">
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;text-align:center;cursor:pointer;transition:all .2s;" onclick="filterByStatus('shortlisted')" id="tab-shortlisted">
            <div style="font-size:1.75rem;font-weight:800;color:var(--success);">2</div>
            <div style="font-size:.75rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;">Shortlisted</div>
          </div>
        </div>
        <div class="col-6 col-md-3 animate-fade-up delay-3">
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;text-align:center;cursor:pointer;transition:all .2s;" onclick="filterByStatus('interview_scheduled')" id="tab-interview">
            <div style="font-size:1.75rem;font-weight:800;color:var(--primary);">1</div>
            <div style="font-size:.75rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;">Interview</div>
          </div>
        </div>
      </div>

      <!-- Applications list -->
      <div class="card-modern animate-fade-up delay-1">
        <div class="d-flex align-items-center justify-content-between p-4 pb-3 flex-wrap gap-3">
          <div>
            <h6 class="fw-700 mb-0">Application History</h6>
            <p class="text-muted mb-0" style="font-size:.78rem;">Track your job application pipeline</p>
          </div>
          <div class="tabs-custom">
            <button class="tab-btn active" onclick="setStatusFilter(this,'all')">All</button>
            <button class="tab-btn" onclick="setStatusFilter(this,'pending')">Pending</button>
            <button class="tab-btn" onclick="setStatusFilter(this,'shortlisted')">Shortlisted</button>
            <button class="tab-btn" onclick="setStatusFilter(this,'interview')">Interviews</button>
          </div>
        </div>
        <div class="section-divider" style="margin:0;"></div>

        <div id="applicationsList">
          <div class="p-4 text-center" style="color:var(--text-muted);">Loading applications…</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="ui.js"></script>
<script src="api.js"></script>
<script>
  let _allApplications = [];
  let _activeStatus = 'all';

  function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('show');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('show');
  }

  function applyStatusFilter(status) {
    _activeStatus = status;

    document.querySelectorAll('.tab-btn').forEach(b => {
      const text = b.textContent.trim().toLowerCase();
      b.classList.toggle('active',
        (status === 'all' && text === 'all') ||
        (status === 'pending' && text === 'pending') ||
        (status === 'shortlisted' && text === 'shortlisted') ||
        (status === 'interview' && text === 'interviews')
      );
    });

    const filtered = status === 'all'
      ? _allApplications
      : status === 'interview'
        ? _allApplications.filter(a => a.status === 'interview_scheduled')
        : _allApplications.filter(a => a.status === status);

    if (_allApplications.length === 0) return;

    document.getElementById('applicationsList').innerHTML = filtered.length
      ? filtered.map(applicationRow).join('')
      : '<div class="p-4 text-center" style="color:var(--text-muted);"><i class="bi bi-inbox me-2"></i>No applications in this category.</div>';
  }

  function setStatusFilter(btn, status) {
    applyStatusFilter(status);
  }

  function filterByStatus(status) {
    applyStatusFilter(status === 'interview_scheduled' ? 'interview' : status);
  }

  function withdrawApp(appId) {
    if (!confirm('Withdraw this application?')) return;
    _allApplications = _allApplications.filter(a => a.application_id !== appId);
    updateApplicationCounts(_allApplications);
    applyStatusFilter(_activeStatus);
    showToast('Application withdrawn.', 'success');
  }

  function applicationRow(app) {
    const score = app.match_score !== null ? Math.round(app.match_score) : 0;
    const scoreColor = score >= 70 ? 'var(--success)' : score >= 50 ? 'var(--warning)' : 'var(--danger)';
    const interview = app.next_interview_date ? `
      <div style="background:rgba(79,70,229,.06);border-radius:var(--radius-sm);padding:.75rem;margin:.6rem 0;border-left:3px solid var(--primary);">
        <div style="font-size:.8rem;font-weight:600;color:var(--primary);"><i class="bi bi-calendar-check me-2"></i>${escapeHtml(app.next_interview_date)} · ${escapeHtml(app.next_interview_mode || '')}</div>
      </div>` : '';
    const withdrawBtn = app.status === 'pending' ? `
      <button class="btn btn-soft-danger btn-sm" onclick="withdrawApp(${app.application_id})">Withdraw</button>` : '';

    return `
      <div class="p-4 d-flex align-items-start gap-3" style="border-bottom:1px solid var(--border);" data-app-id="${app.application_id}">
        <div class="company-logo-placeholder flex-shrink-0">${initials(app.company_name)}</div>
        <div style="flex:1;min-width:0;">
          <div class="d-flex align-items-start justify-content-between gap-2 flex-wrap">
            <div>
              <div class="fw-700" style="font-size:.95rem;">${escapeHtml(app.job_title)}</div>
              <div style="font-size:.78rem;color:var(--text-muted);">${escapeHtml(app.company_name)} · ${escapeHtml(app.location || 'Not specified')}</div>
            </div>
            <span class="badge-modern ${statusClass(app.status)}">${statusLabel(app.status)}</span>
          </div>
          ${interview}
          <div class="d-flex flex-wrap gap-1 my-2">${skillTags(app.skills)}</div>
          <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mt-1">
            <div class="d-flex align-items-center gap-3">
              <span style="font-size:.75rem;color:var(--text-muted);"><i class="bi bi-calendar3 me-1"></i>Applied ${escapeHtml(app.applied_at)}</span>
              <span style="font-size:.75rem;font-weight:700;color:${scoreColor};">Match: ${score}%</span>
            </div>
            ${withdrawBtn}
          </div>
        </div>
      </div>`;
  }

  function updateApplicationCounts(applications) {
    const counts = {
      all: applications.length,
      pending: applications.filter(a => a.status === 'pending').length,
      shortlisted: applications.filter(a => a.status === 'shortlisted').length,
      interview_scheduled: applications.filter(a => a.status === 'interview_scheduled').length,
    };
    document.querySelector('#tab-all div').textContent = counts.all;
    document.querySelector('#tab-pending div').textContent = counts.pending;
    document.querySelector('#tab-shortlisted div').textContent = counts.shortlisted;
    document.querySelector('#tab-interview div').textContent = counts.interview_scheduled;
  }

  async function loadApplications() {
    await requireCurrentUser('candidate');
    try {
      const data = await apiRequest('get_applications.php');
      _allApplications = data.applications || [];
      updateApplicationCounts(_allApplications);
      if (_allApplications.length === 0) {
        document.getElementById('applicationsList').innerHTML =
          '<div class="empty-state"><i class="bi bi-inbox"></i>No applications yet.</div>';
        return;
      }
      applyStatusFilter(_activeStatus);
    } catch (error) {
      showToast(error.message, 'warning');
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadApplications();
  });
</script>
</body>
</html>
