<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — HireSmart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="app-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <a href="index.html" class="sidebar-brand-text text-decoration-none">Hire<span>Smart</span></a>
    </div>
    <div class="sidebar-section-label" id="sidebarLabel"></div>
    <nav class="sidebar-nav" id="sidebarNav">
      <!-- Populated by JS based on user type -->
    </nav>
    <div class="sidebar-section-label">Account</div>
    <nav class="sidebar-nav">
      <a href="profile.html" class="sidebar-link active"><i class="bi bi-person-circle"></i> My Profile</a>
      <a href="login.html" class="sidebar-link" style="color:rgba(239,68,68,.7);"><i class="bi bi-box-arrow-left"></i> Log Out</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar">--</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name">Loading…</div>
          <div class="sidebar-user-role">—</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <header class="main-header">
      <div class="d-flex align-items-center gap-3">
        <button class="sidebar-toggle" onclick="openSidebar()"><i class="bi bi-list"></i></button>
        <h1 class="main-header-title">My Profile</h1>
      </div>
      <div class="d-flex align-items-center gap-2">
        <button class="btn-icon" type="button" title="Notifications"><i class="bi bi-bell"></i></button>
        <div class="sidebar-avatar" style="width:36px;height:36px;font-size:.78rem;">--</div>
      </div>
    </header>

    <div class="main-body">
      <div class="row g-4 justify-content-center">
        <div class="col-lg-8">

          <!-- Profile card -->
          <div class="card-modern p-4 mb-4 animate-fade-up">
            <div class="d-flex align-items-center gap-4 flex-wrap">
              <div id="profileAvatar" style="width:80px;height:80px;border-radius:50%;background:var(--grad-primary);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.6rem;color:#fff;flex-shrink:0;">--</div>
              <div style="flex:1;min-width:0;">
                <h4 id="profileName" class="fw-800 mb-1" style="letter-spacing:-.02em;">Loading…</h4>
                <div id="profileEmail" style="font-size:.9rem;color:var(--text-muted);margin-bottom:.5rem;"></div>
                <span id="profileTypeBadge" class="badge-modern badge-open" style="font-size:.72rem;"></span>
              </div>
            </div>
          </div>

          <!-- Details card -->
          <div class="card-modern p-4 mb-4 animate-fade-up">
            <div class="d-flex align-items-center justify-content-between mb-3">
              <h6 class="fw-700 mb-0">Account Details</h6>
              <button class="btn btn-soft-primary btn-sm" id="editToggleBtn" onclick="toggleEditMode()">
                <i class="bi bi-pencil me-1"></i>Edit
              </button>
            </div>
            <div class="section-divider" style="margin:0 0 1.25rem;"></div>

            <!-- View mode -->
            <div class="row g-3" id="profileDetails"></div>

            <!-- Edit mode -->
            <div id="editForm" style="display:none;">
              <div id="editFields" class="row g-3"></div>
              <div class="d-flex gap-2 mt-4">
                <button class="btn btn-primary-grad" id="saveProfileBtn" onclick="saveProfile(this)">
                  <i class="bi bi-check-lg me-2"></i>Save Changes
                </button>
                <button class="btn btn-outline-secondary rounded-pill px-4" onclick="toggleEditMode()" style="font-weight:600;">Cancel</button>
              </div>
            </div>
          </div>

          <!-- Skills card (candidates only) -->
          <div class="card-modern p-4 animate-fade-up" id="skillsCard" style="display:none;">
            <div class="d-flex align-items-center justify-content-between mb-3">
              <h6 class="fw-700 mb-0">My Skills</h6>
              <a href="parse_cv.html" class="btn btn-soft-primary btn-sm"><i class="bi bi-plus me-1"></i>Update via CV</a>
            </div>
            <div class="section-divider" style="margin:0 0 1.25rem;"></div>
            <div class="d-flex flex-wrap gap-2" id="profileSkillsList">
              <span style="color:var(--text-muted);font-size:.875rem;">No skills yet. Upload your CV to get started.</span>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="ui.js"></script>
<script src="api.js"></script>
<script>
  let _profileUser = null;

  function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('show');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('show');
  }

  function detailRow(label, value) {
    if (!value) return '';
    return `
      <div class="col-sm-6">
        <div style="font-size:.75rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem;">${label}</div>
        <div style="font-size:.9rem;color:var(--text);">${escapeHtml(value)}</div>
      </div>`;
  }

  function editField(id, label, value, type = 'text', required = false) {
    return `
      <div class="col-sm-6 form-group mb-0">
        <label class="form-label-custom">${label}${required ? ' <span style="color:var(--danger);">*</span>' : ''}</label>
        <input type="${type}" class="form-control-custom" id="${id}" value="${escapeHtml(value || '')}" ${required ? 'required' : ''}>
      </div>`;
  }

  function editTextarea(id, label, value) {
    return `
      <div class="col-12 form-group mb-0">
        <label class="form-label-custom">${label}</label>
        <textarea class="form-control-custom" id="${id}" rows="3">${escapeHtml(value || '')}</textarea>
      </div>`;
  }

  function renderProfileView(user) {
    const details = document.getElementById('profileDetails');
    if (user.user_type === 'employer') {
      details.innerHTML =
        detailRow('Company Name', user.name) +
        detailRow('Email', user.email) +
        detailRow('Description', user.company_description);
    } else {
      details.innerHTML =
        detailRow('Full Name', user.name) +
        detailRow('Email', user.email) +
        detailRow('Phone', user.phone);
    }
  }

  function renderEditForm(user) {
    const fields = document.getElementById('editFields');
    if (user.user_type === 'employer') {
      fields.innerHTML =
        editField('editCompanyName', 'Company Name', user.name, 'text', true) +
        editTextarea('editCompanyDesc', 'Company Description', user.company_description);
    } else {
      fields.innerHTML =
        editField('editFullName', 'Full Name', user.name, 'text', true) +
        editField('editPhone', 'Phone', user.phone, 'tel');
    }
  }

  function toggleEditMode() {
    const view    = document.getElementById('profileDetails');
    const form    = document.getElementById('editForm');
    const btn     = document.getElementById('editToggleBtn');
    const editing = form.style.display !== 'none';

    if (editing) {
      form.style.display = 'none';
      view.style.display = '';
      btn.innerHTML = '<i class="bi bi-pencil me-1"></i>Edit';
    } else {
      renderEditForm(_profileUser);
      view.style.display = 'none';
      form.style.display = '';
      btn.innerHTML = '<i class="bi bi-x me-1"></i>Cancel';
    }
  }

  async function saveProfile(btn) {
    const user = _profileUser;
    const input = {};

    if (user.user_type === 'employer') {
      input.company_name        = document.getElementById('editCompanyName').value.trim();
      input.company_description = document.getElementById('editCompanyDesc').value.trim();
      if (!input.company_name) { showToast('Company name is required.', 'warning'); return; }
    } else {
      input.full_name = document.getElementById('editFullName').value.trim();
      input.phone     = document.getElementById('editPhone').value.trim();
      if (!input.full_name) { showToast('Full name is required.', 'warning'); return; }
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Saving…';

    try {
      const data = await apiRequest('update_profile.php', {
        method: 'POST',
        body: JSON.stringify(input),
      });
      _profileUser = data.user;

      // Update avatar and name in header card
      const name = data.user.name;
      document.getElementById('profileAvatar').textContent = initials(name);
      document.getElementById('profileName').textContent   = name;

      renderProfileView(data.user);

      // Switch back to view mode
      document.getElementById('editForm').style.display    = 'none';
      document.getElementById('profileDetails').style.display = '';
      document.getElementById('editToggleBtn').innerHTML   = '<i class="bi bi-pencil me-1"></i>Edit';

      showToast('Profile updated successfully.', 'success');
    } catch (err) {
      showToast(err.message, 'warning');
    }

    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-check-lg me-2"></i>Save Changes';
  }

  async function loadProfile() {
    const user = await requireCurrentUser();
    if (!user) return;
    _profileUser = user;

    const name = user.name || user.email;
    document.getElementById('profileAvatar').textContent   = initials(name);
    document.getElementById('profileName').textContent     = name;
    document.getElementById('profileEmail').textContent    = user.email;
    document.getElementById('profileTypeBadge').textContent =
      user.user_type === 'employer' ? 'Employer' : 'Candidate';

    // Build sidebar nav
    const nav = document.getElementById('sidebarNav');
    if (user.user_type === 'employer') {
      document.getElementById('sidebarLabel').textContent = 'Recruitment';
      nav.innerHTML = `
        <a href="dashboard_employer.html" class="sidebar-link"><i class="bi bi-grid-1x2"></i> Dashboard</a>
        <a href="dashboard_employer.html" class="sidebar-link"><i class="bi bi-plus-circle"></i> Post a Job</a>
        <a href="my_jobs.html" class="sidebar-link"><i class="bi bi-briefcase"></i> My Jobs</a>
        <a href="employer_candidates.html" class="sidebar-link"><i class="bi bi-people"></i> Candidates</a>`;
    } else {
      document.getElementById('sidebarLabel').textContent = 'Main';
      nav.innerHTML = `
        <a href="dashboard_candidate.html" class="sidebar-link"><i class="bi bi-grid-1x2"></i> Dashboard</a>
        <a href="jobs.html" class="sidebar-link"><i class="bi bi-briefcase"></i> Browse Jobs</a>
        <a href="applications.html" class="sidebar-link"><i class="bi bi-send"></i> My Applications</a>
        <a href="parse_cv.html" class="sidebar-link"><i class="bi bi-file-earmark-person"></i> Parse CV</a>`;
    }

    renderProfileView(user);

    // Load skills for candidates
    if (user.user_type === 'candidate') {
      document.getElementById('skillsCard').style.display = '';
      try {
        const data = await apiRequest('candidate_dashboard.php');
        document.getElementById('profileSkillsList').innerHTML = data.skills.length
          ? data.skills.map(s =>
              `<span class="skill-tag ${escapeHtml(s.category)}">${escapeHtml(s.skill_name)}</span>`
            ).join('')
          : '<span style="color:var(--text-muted);font-size:.875rem;">No skills yet. Upload your CV to get started.</span>';
      } catch (_) {}
    }
  }

  document.addEventListener('DOMContentLoaded', loadProfile);
</script>
</body>
</html>
